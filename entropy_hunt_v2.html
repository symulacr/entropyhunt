<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f3f4f6;
    --color-background-success: #dcfce7;
    --color-background-info: #dbeafe;
    --color-background-warning: #fef3c7;
    --color-background-danger: #fee2e2;
    --color-border-secondary: #9ca3af;
    --color-border-tertiary: #d1d5db;
    --color-border-warning: #f59e0b;
    --color-border-danger: #ef4444;
    --color-text-primary: #111827;
    --color-text-secondary: #374151;
    --color-text-tertiary: #6b7280;
    --color-text-success: #166534;
    --color-text-info: #1d4ed8;
    --color-text-warning: #92400e;
    --color-text-danger: #991b1b;
    --font-mono:
      ui-monospace, SFMono-Regular, SFMono, Menlo, Monaco, Consolas,
      "Liberation Mono", "Courier New", monospace;
    --font-sans:
      Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
      "Segoe UI", sans-serif;
  }
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: var(--font-mono);
  }
  .root {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    height: 640px;
    border: 0.5px solid var(--color-border-tertiary);
  }
  .header {
    display: flex;
    align-items: center;
    padding: 0 14px;
    height: 38px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    gap: 10px;
  }
  .header-title {
    font-size: 12px;
    color: var(--color-text-primary);
    font-weight: 500;
  }
  .header-tag {
    font-size: 9px;
    padding: 2px 7px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 2px;
    color: var(--color-text-tertiary);
  }
  .spacer {
    flex: 1;
  }
  .btn {
    font-size: 10px;
    padding: 4px 10px;
    border: 0.5px solid var(--color-border-tertiary);
    background: none;
    cursor: pointer;
    color: var(--color-text-secondary);
    border-radius: 2px;
    font-family: var(--font-mono);
  }
  .btn:hover {
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
  }
  .btn.active {
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
  }
  .btn.warn {
    border-color: var(--color-border-warning);
    color: var(--color-text-warning);
  }
  .btn.warn:hover,
  .btn.warn.active {
    background: var(--color-background-warning);
  }
  .btn.danger {
    border-color: var(--color-border-danger);
    color: var(--color-text-danger);
  }
  .btn.danger:hover {
    background: var(--color-background-danger);
  }
  .live-input {
    width: 180px;
    height: 28px;
    padding: 0 8px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 8px;
    font-size: 10px;
    color: var(--color-text-secondary);
    background: var(--color-background-primary);
  }
  .btn.file {
    position: relative;
    overflow: hidden;
  }
  .btn.file input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .header-mode {
    font-size: 9px;
    padding: 2px 7px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 999px;
    color: var(--color-text-secondary);
  }
  .header-mode.replay {
    background: var(--color-background-info);
    color: var(--color-text-info);
    border-color: var(--color-text-info);
  }
  .kv-bar {
    display: flex;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .kv {
    flex: 1;
    border-right: 0.5px solid var(--color-border-tertiary);
    padding: 8px 14px;
  }
  .kv:last-child {
    border-right: none;
  }
  .kv-k {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-tertiary);
    margin-bottom: 3px;
  }
  .kv-v {
    font-size: 22px;
    color: var(--color-text-primary);
  }
  .kv-v.g {
    color: var(--color-text-success);
  }
  .kv-v.a {
    color: var(--color-text-warning);
  }
  .body {
    display: grid;
    grid-template-columns: auto 1fr;
    min-height: 0;
  }
  .grid-wrap {
    padding: 14px;
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .grid-canvas-wrap {
    position: relative;
  }
  canvas {
    display: block;
    cursor: crosshair;
  }
  .tooltip {
    position: absolute;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 2px;
    font-size: 9px;
    padding: 3px 7px;
    color: var(--color-text-secondary);
    pointer-events: none;
    display: none;
    white-space: nowrap;
    z-index: 10;
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 8px;
    color: var(--color-text-tertiary);
  }
  .legend-grad {
    width: 80px;
    height: 6px;
    border-radius: 1px;
    background: linear-gradient(to right, #111, #888, #eee);
  }
  .side {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .side-block {
    border-bottom: 0.5px solid var(--color-border-tertiary);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .side-head {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-tertiary);
    padding: 6px 12px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .side-body {
    overflow-y: auto;
  }
  .drone-row {
    display: grid;
    grid-template-columns: 14px 56px 52px 60px 1fr auto;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    font-size: 9px;
    cursor: pointer;
  }
  .drone-row:hover {
    background: var(--color-background-secondary);
  }
  .drone-row.stale {
    opacity: 0.4;
  }
  .dr-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .dr-name {
    color: var(--color-text-primary);
  }
  .dr-pos {
    color: var(--color-text-tertiary);
  }
  .dr-target {
    color: var(--color-text-secondary);
  }
  .dr-h {
    color: var(--color-text-secondary);
    font-size: 8px;
  }
  .chip {
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 1px;
    font-family: var(--font-sans);
    font-weight: 500;
  }
  .chip-s {
    background: var(--color-background-success);
    color: var(--color-text-success);
  }
  .chip-t {
    background: var(--color-background-info);
    color: var(--color-text-info);
  }
  .chip-d {
    background: var(--color-background-danger);
    color: var(--color-text-danger);
  }
  .chip-i {
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-tertiary);
    background: none;
  }
  .log-line {
    padding: 4px 10px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    font-size: 8px;
    color: var(--color-text-secondary);
    line-height: 1.5;
  }
  .log-type {
    font-weight: 500;
    font-family: var(--font-sans);
  }
  .log-bft {
    color: var(--color-text-warning);
  }
  .log-ok {
    color: var(--color-text-success);
  }
  .log-err {
    color: var(--color-text-danger);
  }
  .log-info {
    color: var(--color-text-info);
  }
  .log-warn {
    color: var(--color-text-warning);
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .ctl-lbl {
    font-size: 8px;
    color: var(--color-text-tertiary);
    white-space: nowrap;
  }
  .footer {
    border-top: 0.5px solid var(--color-border-tertiary);
    padding: 5px 14px;
    font-size: 9px;
    color: var(--color-text-tertiary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pulse {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--color-text-success);
    animation: p 2s infinite;
  }
  @keyframes p {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.2;
    }
  }
</style>

<div class="root">
  <div class="header">
    <span class="header-title">entropy hunt</span>
    <span class="header-tag">track 2 · search &amp; rescue</span>
    <span class="header-mode" id="mode-chip">synthetic demo</span>
    <span class="spacer"></span>
    <label class="btn file">
      load replay
      <input id="replay-input" type="file" accept="application/json" />
    </label>
    <button class="btn" id="replay-reset" onclick="clearReplay()">
      clear replay
    </button>
    <input class="live-input" id="live-url" value="http://127.0.0.1:8765/snapshot.json" />
    <button class="btn" id="live-btn" onclick="connectLive()">
      connect live
    </button>
    <button class="btn" id="live-stop" onclick="disconnectLive()">
      stop live
    </button>
    <button class="btn warn" id="packet-btn" onclick="dropPackets()">
      drop packets 20%
    </button>
    <button class="btn" id="demo-btn" onclick="toggleAutoDemo()">
      auto demo off
    </button>
    <button class="btn danger" onclick="killRandom()">kill drone</button>
    <button class="btn" onclick="reviveAll()">revive all</button>
  </div>

  <div class="kv-bar">
    <div class="kv">
      <div class="kv-k">coverage</div>
      <div class="kv-v g" id="kv-cov">0%</div>
    </div>
    <div class="kv">
      <div class="kv-k">avg entropy</div>
      <div class="kv-v a" id="kv-ent">1.00</div>
    </div>
    <div class="kv">
      <div class="kv-k">auctions</div>
      <div class="kv-v" id="kv-auc">0</div>
    </div>
    <div class="kv">
      <div class="kv-k">dropouts</div>
      <div class="kv-v" id="kv-drop">0</div>
    </div>
    <div class="kv">
      <div class="kv-k">elapsed</div>
      <div class="kv-v" id="kv-t">0s</div>
    </div>
  </div>

  <div class="body">
    <div class="grid-wrap">
      <div class="grid-canvas-wrap">
        <canvas id="gc" width="240" height="240"></canvas>
        <div class="tooltip" id="tip"></div>
      </div>
      <div class="legend">
        <span>high H</span>
        <div class="legend-grad"></div>
        <span>low H</span>
        <span style="margin-left: 8px; color: var(--color-text-tertiary)"
          >hover cell · click drone to kill</span
        >
      </div>
    </div>

    <div class="side">
      <div class="side-block" style="flex: 0 0 auto">
        <div class="side-head">
          drone roster
          <span
            style="
              margin-left: auto;
              font-size: 8px;
              color: var(--color-text-tertiary);
            "
            >click row to kill</span
          >
        </div>
        <div id="drone-list"></div>
      </div>
      <div class="controls">
        <span class="ctl-lbl">speed</span>
        <input
          type="range"
          min="1"
          max="5"
          value="2"
          id="speed-sl"
          style="flex: 1"
          oninput="setSpeed(this.value)"
        />
        <span class="ctl-lbl" id="speed-lbl">2×</span>
      </div>
      <div class="side-block" style="flex: 1">
        <div class="side-head">event log</div>
        <div class="side-body" id="event-log"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="pulse" id="mesh-pulse"></div>
    <span id="footer-msg">initialising vertex p2p mesh...</span>
  </div>
</div>

<script>
  const GRID_SIZE = 10;
  const CELL_SIZE = 24;
  const SEARCH_INCREMENT = 0.12;
  const SEARCH_COMPLETE = 0.92;
  const DECAY_RATE = 0.001;
  const TICK_MS = 700;
  let TARGET = { x: 7, y: 3 };
  const DEMO_CONTENTION_CELL = { x: 5, y: 5 };
  const DEMO_TIMELINE = {
    packetLossAt: 40,
    contentionAt: 80,
    dropoutAt: 120,
    survivorAt: 160,
  };
  const START_POSITIONS = [
    [0, 0],
    [GRID_SIZE - 1, 0],
    [0, GRID_SIZE - 1],
    [GRID_SIZE - 1, GRID_SIZE - 1],
    [Math.floor(GRID_SIZE / 2), Math.floor(GRID_SIZE / 2)],
  ];
  const COLORS = ["#378ADD", "#1D9E75", "#BA7517", "#D85A30", "#D4537E"];
  const NAMES = ["drone_1", "drone_2", "drone_3", "drone_4", "drone_5"];

  const canvas = document.getElementById("gc");
  const ctx = canvas.getContext("2d");
  const tooltip = document.getElementById("tip");
  const packetButton = document.getElementById("packet-btn");
  const demoButton = document.getElementById("demo-btn");
  const replayResetButton = document.getElementById("replay-reset");
  const replayInput = document.getElementById("replay-input");
  const liveInput = document.getElementById("live-url");
  const liveButton = document.getElementById("live-btn");
  const liveStopButton = document.getElementById("live-stop");
  const canvasOutlineColor = "#0f1115";

  let speed = 2;
  let packetDrop = false;
  let elapsed = 0;
  let bftRounds = 0;
  let auctions = 0;
  let dropouts = 0;
  let found = false;
  let missionComplete = false;
  let events = [];
  let sourceMode = "synthetic";
  let liveSource = "http://127.0.0.1:8765/snapshot.json";
  let livePollHandle = null;
  const autoDemo = {
    enabled: false,
    packetLoss: false,
    contention: false,
    dropout: false,
    survivor: false,
  };

  function setSourceMode(mode) {
    sourceMode = mode;
    const chip = document.getElementById("mode-chip");
    chip.textContent = mode === "replay" ? "replay snapshot" : mode === "live" ? "live snapshot" : "synthetic demo";
    chip.classList.toggle("replay", mode === "replay" || mode === "live");
    replayResetButton.disabled = mode !== "replay";
    liveButton.disabled = mode === "live";
    liveStopButton.disabled = mode !== "live";
  }

  const grid = Array.from({ length: GRID_SIZE }, (_, y) =>
    Array.from({ length: GRID_SIZE }, (_, x) => ({
      x,
      y,
      certainty: 0.5,
      get c() {
        return this.certainty;
      },
      set c(value) {
        this.certainty = value;
      },
      owner: -1,
    })),
  );

  const drones = NAMES.map((id, index) => {
    const [x, y] = START_POSITIONS[index];
    return {
      id,
      color: COLORS[index],
      x,
      y,
      tx: null,
      ty: null,
      stale: false,
      status: "idle",
      cells: 0,
    };
  });

  function entropy(certainty) {
    if (certainty <= 0 || certainty >= 1) return 0;
    return -(
      certainty * Math.log2(certainty) +
      (1 - certainty) * Math.log2(1 - certainty)
    );
  }

  function H(certainty) {
    return entropy(certainty);
  }

  function cellKey(x, y) {
    return `${x},${y}`;
  }

  function getCell(x, y) {
    return grid[y][x];
  }

  function distanceTo(drone, x, y) {
    return Math.hypot(x - drone.x, y - drone.y);
  }

  function compareCandidates(a, b) {
    return (
      b.entropy - a.entropy || a.distance - b.distance || a.y - b.y || a.x - b.x
    );
  }

  function compareClaimants(left, right, x, y) {
    const distanceDelta =
      distanceTo(left.drone, x, y) - distanceTo(right.drone, x, y);
    if (Math.abs(distanceDelta) > 1e-9) {
      return distanceDelta;
    }
    return left.drone.id.localeCompare(right.drone.id);
  }

  function releaseClaim(index) {
    for (const row of grid) {
      for (const cell of row) {
        if (cell.owner === index) {
          cell.owner = -1;
        }
      }
    }
  }

  function addEvent(type, msg) {
    events.unshift({ type, msg, t: elapsed });
    if (events.length > 24) events.pop();
    renderLog();
  }

  function mapBackendStatus(rawStatus) {
    return {
      transiting: "transit",
      claiming: "transit",
      claim_won: "searching",
      claim_lost: "transit",
      stale: "offline",
    }[rawStatus] || rawStatus || "idle";
  }

  function mapReplayEventType(type) {
    return {
      auction: "bft",
      bft: "bft",
      failure: "err",
      stale: "err",
      heartbeat_timeout: "err",
      zone_release: "warn",
      zone_priority_reclaim: "ok",
      survivor: "ok",
      survivor_found: "ok",
      survivor_ack: "ok",
      zone_complete: "ok",
      claim: "info",
      mesh: "info",
      map: "info",
    }[type] || "info";
  }

  function formatReplayEvent(event) {
    return {
      type: mapReplayEventType(event.type),
      msg: event.message || event.type || "replay event",
      t: event.t ?? 0,
    };
  }

  function applySnapshotPayload(payload, mode) {
    const rows = payload?.grid;
    const summary = payload?.summary || payload || {};
    const stats = payload?.stats || summary || {};
    const targetValue = payload?.config?.target || summary?.target || [7, 3];
    if (!Array.isArray(rows) || rows.length !== GRID_SIZE) {
      throw new Error(`expected ${GRID_SIZE} snapshot rows`);
    }
    TARGET = { x: Number(targetValue[0] ?? 7), y: Number(targetValue[1] ?? 3) };

    rows.forEach((row, y) => {
      if (!Array.isArray(row) || row.length !== GRID_SIZE) {
        throw new Error(`expected ${GRID_SIZE} snapshot columns in row ${y}`);
      }
      row.forEach((cell, x) => {
        const replayCell = getCell(x, y);
        replayCell.certainty = Number(cell.certainty ?? 0.5);
        replayCell.owner = -1;
      });
    });

    elapsed = Number(stats.duration_elapsed ?? summary.duration_elapsed ?? 0);
    bftRounds = Number(stats.bft_rounds ?? 0);
    auctions = Number(stats.auctions ?? 0);
    dropouts = Number(stats.dropouts ?? 0);
    found = Boolean(stats.survivor_found ?? summary.survivor_found);
    missionComplete = mode === "replay";
    packetDrop = false;
    autoDemo.enabled = false;
    autoDemo.packetLoss = false;
    autoDemo.contention = false;
    autoDemo.dropout = false;
    autoDemo.survivor = false;
    setButtonState(packetButton, false, "drop packets on", "drop packets 20%");
    setButtonState(demoButton, false, "auto demo on", "auto demo off");

    const replayDrones = Array.isArray(summary.drones) ? summary.drones : [];
    drones.forEach((drone, index) => {
      const replayDrone = replayDrones[index] || {};
      const position = replayDrone.position || START_POSITIONS[index];
      const target = replayDrone.target || null;
      drone.x = position[0];
      drone.y = position[1];
      drone.tx = target ? target[0] : null;
      drone.ty = target ? target[1] : null;
      drone.stale = replayDrone.alive === false;
      drone.status = mapBackendStatus(
        replayDrone.status || (drone.stale ? "offline" : "idle"),
      );
      drone.cells = Number(replayDrone.searched_cells ?? drone.cells ?? 0);
    });

    events = Array.isArray(payload.events)
      ? payload.events.slice(-24).reverse().map(formatReplayEvent)
      : [];

    drawGrid();
    renderDrones();
    renderLog();
    updateStats();
    setSourceMode(mode);
    setFooter(
      mode === "live"
        ? "live snapshot connected — polling current peer state"
        : found
          ? "replay loaded — final simulation snapshot with survivor confirmation"
          : "replay loaded — final simulation snapshot",
    );
  }

  function applyReplayPayload(payload) {
    applySnapshotPayload(payload, "replay");
  }

  function applyLivePayload(payload) {
    applySnapshotPayload(payload, "live");
  }

  async function pollLiveSnapshot() {
    if (!liveSource) return;
    const response = await fetch(liveSource, { cache: "no-store" });
    if (!response.ok) throw new Error(`live snapshot request failed (${response.status})`);
    applyLivePayload(await response.json());
  }

  function connectLive(nextSource) {
    liveSource = (nextSource || liveInput.value || liveSource).trim();
    liveInput.value = liveSource;
    if (!liveSource) return;
    if (livePollHandle) clearInterval(livePollHandle);
    setSourceMode("live");
    void pollLiveSnapshot().catch((error) => {
      setFooter(`live snapshot failed — ${error.message}`);
      addEvent("err", `live snapshot failed — ${error.message}`);
    });
    livePollHandle = setInterval(() => {
      void pollLiveSnapshot().catch((error) => {
        setFooter(`live snapshot failed — ${error.message}`);
        addEvent("err", `live snapshot failed — ${error.message}`);
      });
    }, 1000);
  }

  function disconnectLive() {
    if (sourceMode !== "live") return;
    if (livePollHandle) {
      clearInterval(livePollHandle);
      livePollHandle = null;
    }
    if (window.location && typeof window.location.reload === "function") {
      window.location.reload();
      return;
    }
    setSourceMode("synthetic");
    missionComplete = false;
  }

  function clearReplay() {
    if (sourceMode !== "replay") return;
    if (window.location && typeof window.location.reload === "function") {
      window.location.reload();
      return;
    }
    setSourceMode("synthetic");
    missionComplete = false;
  }

  function buildCandidates(drone, reserved) {
    const candidates = [];
    for (let y = 0; y < GRID_SIZE; y += 1) {
      for (let x = 0; x < GRID_SIZE; x += 1) {
        const key = cellKey(x, y);
        const cell = getCell(x, y);
        if (reserved.has(key) || cell.owner >= 0) continue;
        candidates.push({
          x,
          y,
          entropy: entropy(cell.certainty),
          distance: distanceTo(drone, x, y),
        });
      }
    }
    return candidates.sort(compareCandidates);
  }

  function maxEntropyCell(excludedCells = []) {
    const excluded = new Set(excludedCells.map(([x, y]) => cellKey(x, y)));
    const candidate = buildCandidates({ x: 0, y: 0 }, excluded)[0];
    return candidate ? [candidate.x, candidate.y] : null;
  }

  function grantClaim(index, candidate) {
    const drone = drones[index];
    const cell = getCell(candidate.x, candidate.y);
    cell.owner = index;
    drone.tx = candidate.x;
    drone.ty = candidate.y;
    drone.status =
      drone.x === candidate.x && drone.y === candidate.y
        ? "searching"
        : "transit";
  }

  function reassignIdleDrones() {
    const reserved = new Set();

    drones.forEach((drone, index) => {
      if (drone.stale || drone.tx == null || drone.ty == null) return;
      if (drone.status === "transit" || drone.status === "searching") {
        reserved.add(cellKey(drone.tx, drone.ty));
        getCell(drone.tx, drone.ty).owner = index;
      }
    });

    let pending = drones
      .map((drone, index) => ({
        index,
        drone,
        candidates: buildCandidates(drone, reserved),
      }))
      .filter(({ drone }) => !drone.stale && drone.status === "idle");

    while (pending.length) {
      const proposals = new Map();
      const nextPending = [];

      pending.forEach((entry) => {
        while (
          entry.candidates.length &&
          reserved.has(cellKey(entry.candidates[0].x, entry.candidates[0].y))
        ) {
          entry.candidates.shift();
        }
        const candidate = entry.candidates.shift();
        if (!candidate) {
          entry.drone.tx = null;
          entry.drone.ty = null;
          entry.drone.status = "idle";
          return;
        }
        const key = cellKey(candidate.x, candidate.y);
        const group = proposals.get(key) || [];
        group.push({ ...entry, candidate });
        proposals.set(key, group);
      });

      proposals.forEach((group, key) => {
        if (group.length === 1) {
          const { index, candidate } = group[0];
          grantClaim(index, candidate);
          reserved.add(key);
          return;
        }

        bftRounds += 1;
        auctions += 1;
        group.sort((left, right) =>
          compareClaimants(
            left,
            right,
            group[0].candidate.x,
            group[0].candidate.y,
          ),
        );
        const [winner, ...losers] = group;
        addEvent(
          "bft",
          `auction resolved at [${winner.candidate.x},${winner.candidate.y}] — ${group.map(({ drone }) => drone.id).join(" vs ")} → ${winner.drone.id}`,
        );
        grantClaim(winner.index, winner.candidate);
        reserved.add(key);
        losers.forEach(({ index, drone, candidates }) => {
          nextPending.push({ index, drone, candidates });
        });
      });

      pending = nextPending;
    }
  }

  function assignTargets() {
    const claims = new Map();

    drones.forEach((drone, index) => {
      if (
        drone.stale ||
        drone.tx == null ||
        drone.ty == null ||
        (drone.status !== "transit" && drone.status !== "searching")
      ) {
        return;
      }
      const key = cellKey(drone.tx, drone.ty);
      const group = claims.get(key) || [];
      group.push({ index, drone, candidate: { x: drone.tx, y: drone.ty } });
      claims.set(key, group);
    });

    drones.forEach((drone, index) => {
      if (drone.stale || drone.status !== "idle") return;
      const candidate = buildCandidates(drone, new Set())[0];
      if (!candidate) return;
      const key = cellKey(candidate.x, candidate.y);
      const group = claims.get(key) || [];
      group.push({ index, drone, candidate });
      claims.set(key, group);
    });

    claims.forEach((group, key) => {
      if (group.length === 1) {
        const { index, candidate } = group[0];
        grantClaim(index, candidate);
        return;
      }

      auctions += 1;
      bftRounds += 1;
      group.sort((left, right) =>
        compareClaimants(
          left,
          right,
          group[0].candidate.x,
          group[0].candidate.y,
        ),
      );
      const [winner, ...losers] = group;
      addEvent(
        "bft",
        `auction at [${winner.candidate.x},${winner.candidate.y}] winner: ${winner.drone.id}`,
      );
      grantClaim(winner.index, winner.candidate);
      losers.forEach(({ index, drone }) => {
        releaseClaim(index);
        drone.tx = null;
        drone.ty = null;
        drone.status = "idle";
      });
      claims.set(key, [winner]);
    });
  }

  function handleSearch(drone, index) {
    const cell = getCell(drone.x, drone.y);
    const wasComplete = cell.certainty >= SEARCH_COMPLETE;
    cell.owner = index;
    cell.certainty = Math.min(0.98, cell.certainty + SEARCH_INCREMENT);

    if (!wasComplete && cell.certainty >= SEARCH_COMPLETE) {
      drone.cells += 1;
      drone.status = "idle";
      drone.tx = null;
      drone.ty = null;
      cell.owner = -1;

      if (!found && drone.x === TARGET.x && drone.y === TARGET.y) {
        found = true;
        missionComplete = true;
        addEvent(
          "ok",
          `SURVIVOR EVENT at [${TARGET.x},${TARGET.y}] — demo mesh notification raised`,
        );
        setFooter("survivor detected — demo run complete");
      }
    }
  }

  function stepDrones() {
    drones.forEach((drone, index) => {
      if (drone.stale) return;
      if (packetDrop && Math.random() < 0.2) return;

      if (drone.status === "transit" && drone.tx != null && drone.ty != null) {
        if (drone.x !== drone.tx) {
          drone.x += drone.x < drone.tx ? 1 : -1;
        } else if (drone.y !== drone.ty) {
          drone.y += drone.y < drone.ty ? 1 : -1;
        }
        if (drone.x === drone.tx && drone.y === drone.ty) {
          drone.status = "searching";
        }
      }

      if (
        drone.status === "searching" &&
        drone.tx != null &&
        drone.ty != null &&
        drone.x === drone.tx &&
        drone.y === drone.ty
      ) {
        handleSearch(drone, index);
      }
    });
  }

  function decayGrid() {
    for (const row of grid) {
      for (const cell of row) {
        if (cell.owner < 0) {
          cell.certainty += DECAY_RATE * (0.5 - cell.certainty);
        }
      }
    }
  }

  function coverage() {
    let searched = 0;
    for (const row of grid) {
      for (const cell of row) {
        if (cell.certainty >= SEARCH_COMPLETE) searched += 1;
      }
    }
    return Math.round((searched / (GRID_SIZE * GRID_SIZE)) * 100);
  }

  function averageEntropy() {
    let total = 0;
    for (const row of grid) {
      for (const cell of row) {
        total += entropy(cell.certainty);
      }
    }
    return (total / (GRID_SIZE * GRID_SIZE)).toFixed(2);
  }

  function drawGrid() {
    ctx.clearRect(0, 0, GRID_SIZE * CELL_SIZE, GRID_SIZE * CELL_SIZE);

    for (let y = 0; y < GRID_SIZE; y += 1) {
      for (let x = 0; x < GRID_SIZE; x += 1) {
        const cell = getCell(x, y);
        const intensity = Math.floor(255 - entropy(cell.certainty) * 210);
        ctx.fillStyle = `rgb(${intensity},${intensity},${intensity})`;
        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);

        if (cell.owner >= 0) {
          ctx.fillStyle = `${drones[cell.owner].color}22`;
          ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }

        if (x === TARGET.x && y === TARGET.y) {
          ctx.strokeStyle = found ? "#1D9E75" : "#888";
          ctx.lineWidth = 1;
          ctx.strokeRect(
            x * CELL_SIZE + 1,
            y * CELL_SIZE + 1,
            CELL_SIZE - 2,
            CELL_SIZE - 2,
          );
        }
      }
    }

    ctx.strokeStyle = "rgba(128,128,128,0.15)";
    ctx.lineWidth = 0.3;
    for (let i = 0; i <= GRID_SIZE; i += 1) {
      ctx.beginPath();
      ctx.moveTo(i * CELL_SIZE, 0);
      ctx.lineTo(i * CELL_SIZE, GRID_SIZE * CELL_SIZE);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL_SIZE);
      ctx.lineTo(GRID_SIZE * CELL_SIZE, i * CELL_SIZE);
      ctx.stroke();
    }

    drones.forEach((drone) => {
      const displayStatus = mapBackendStatus(drone.status);
      if (drone.stale) {
        ctx.strokeStyle = `${drone.color}44`;
        ctx.lineWidth = 1;
        ctx.strokeRect(
          drone.x * CELL_SIZE + 3,
          drone.y * CELL_SIZE + 3,
          CELL_SIZE - 6,
          CELL_SIZE - 6,
        );
        return;
      }

      ctx.beginPath();
      ctx.arc(
        drone.x * CELL_SIZE + CELL_SIZE / 2,
        drone.y * CELL_SIZE + CELL_SIZE / 2,
        5,
        0,
        Math.PI * 2,
      );
      ctx.fillStyle = drone.color;
      ctx.fill();
      ctx.strokeStyle = canvasOutlineColor;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      if (
        displayStatus === "transit" &&
        drone.tx != null &&
        drone.ty != null &&
        (drone.x !== drone.tx || drone.y !== drone.ty)
      ) {
        ctx.beginPath();
        ctx.setLineDash([2, 3]);
        ctx.moveTo(
          drone.x * CELL_SIZE + CELL_SIZE / 2,
          drone.y * CELL_SIZE + CELL_SIZE / 2,
        );
        ctx.lineTo(
          drone.tx * CELL_SIZE + CELL_SIZE / 2,
          drone.ty * CELL_SIZE + CELL_SIZE / 2,
        );
        ctx.strokeStyle = `${drone.color}55`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });
  }

  function renderDrones() {
    document.getElementById("drone-list").innerHTML = drones
      .map((drone, index) => {
        const displayStatus = mapBackendStatus(drone.status);
        const chip = drone.stale
          ? '<span class="chip chip-d">offline</span>'
          : displayStatus === "searching"
            ? '<span class="chip chip-s">searching</span>'
            : displayStatus === "transit"
              ? '<span class="chip chip-t">transit</span>'
              : '<span class="chip chip-i">idle</span>';
        const currentEntropy = entropy(
          getCell(drone.x, drone.y).certainty,
        ).toFixed(2);
        const target =
          drone.tx == null || drone.ty == null
            ? "[--,--]"
            : `[${drone.tx},${drone.ty}]`;
        return `<div class="drone-row${drone.stale ? " stale" : ""}" onclick="killDrone(drones[${index}])">
      <div class="dr-dot" style="background:${drone.color}"></div>
      <span class="dr-name">${drone.id}</span>
      <span class="dr-pos">[${drone.x},${drone.y}]</span>
      <span class="dr-target">→${target}</span>
      <span class="dr-h">H=${currentEntropy} · cells=${drone.cells}</span>
      ${chip}
    </div>`;
      })
      .join("");
  }

  function renderLog() {
    const typeClass = {
      bft: "bft",
      ok: "ok",
      err: "err",
      warn: "warn",
      info: "info",
    };
    document.getElementById("event-log").innerHTML = events
      .map(
        (event) => `
    <div class="log-line">
      <span class="log-type log-${typeClass[event.type] || "info"}">${event.type.toUpperCase()}</span>
      <span style="color:var(--color-text-tertiary)"> t=${event.t}s </span>${event.msg}
    </div>`,
      )
      .join("");
  }

  function setFooter(msg) {
    document.getElementById("footer-msg").textContent = msg;
  }

  function setButtonState(button, active, activeLabel, inactiveLabel) {
    button.classList.toggle("active", active);
    button.textContent = active ? activeLabel : inactiveLabel;
  }

  function updateStats() {
    document.getElementById("kv-cov").textContent = `${coverage()}%`;
    document.getElementById("kv-ent").textContent = averageEntropy();
    document.getElementById("kv-auc").textContent = auctions;
    document.getElementById("kv-drop").textContent = dropouts;
    document.getElementById("kv-t").textContent = `${elapsed}s`;
  }

  function respawnDrone(drone, index, randomize = false) {
    const [startX, startY] = START_POSITIONS[index];
    drone.x = randomize ? Math.floor(Math.random() * GRID_SIZE) : startX;
    drone.y = randomize ? Math.floor(Math.random() * GRID_SIZE) : startY;
    drone.tx = null;
    drone.ty = null;
    drone.status = "idle";
  }

  function getDroneById(droneId) {
    return drones.find((drone) => drone.id === droneId) || null;
  }

  function getAliveDrone(droneId) {
    const drone = getDroneById(droneId);
    return drone && !drone.stale ? drone : null;
  }

  function nearestAliveDroneTo(x, y, excludeIds = []) {
    return (
      drones
        .filter((drone) => !drone.stale && !excludeIds.includes(drone.id))
        .sort((left, right) => {
          const distanceDelta =
            distanceTo(left, x, y) - distanceTo(right, x, y);
          if (Math.abs(distanceDelta) > 1e-9) return distanceDelta;
          return left.id.localeCompare(right.id);
        })[0] || null
    );
  }

  function primeUnownedCells(certainty) {
    for (const row of grid) {
      for (const cell of row) {
        if (cell.owner < 0 && !(cell.x === TARGET.x && cell.y === TARGET.y)) {
          cell.certainty = certainty;
        }
      }
    }
  }

  function stageDemoContention() {
    const first = getAliveDrone("drone_1");
    const second = getAliveDrone("drone_2");
    if (!first || !second) return;

    primeUnownedCells(0.86);
    const targetCell = getCell(DEMO_CONTENTION_CELL.x, DEMO_CONTENTION_CELL.y);
    targetCell.certainty = 0.5;
    [first, second].forEach((drone) => {
      const index = drones.indexOf(drone);
      releaseClaim(index);
      drone.tx = null;
      drone.ty = null;
      drone.status = "idle";
    });
    first.x = DEMO_CONTENTION_CELL.x;
    first.y = DEMO_CONTENTION_CELL.y - 1;
    second.x = DEMO_CONTENTION_CELL.x;
    second.y = DEMO_CONTENTION_CELL.y + 2;
    addEvent(
      "info",
      `auto demo: staged contention at [${DEMO_CONTENTION_CELL.x},${DEMO_CONTENTION_CELL.y}] for drone_1 vs drone_2`,
    );
  }

  function stageDemoSurvivor() {
    const drone = nearestAliveDroneTo(TARGET.x, TARGET.y);
    if (!drone) return;
    const index = drones.indexOf(drone);
    releaseClaim(index);
    drone.x = TARGET.x;
    drone.y = TARGET.y;
    drone.tx = TARGET.x;
    drone.ty = TARGET.y;
    drone.status = "searching";
    const targetCell = getCell(TARGET.x, TARGET.y);
    targetCell.owner = index;
    targetCell.certainty = Math.max(
      targetCell.certainty,
      SEARCH_COMPLETE - 0.04,
    );
    addEvent(
      "info",
      `auto demo: staged survivor confirmation run for ${drone.id} at [${TARGET.x},${TARGET.y}]`,
    );
  }

  function setPacketDrop(nextState, reason = null) {
    packetDrop = nextState;
    setButtonState(
      packetButton,
      packetDrop,
      "drop packets on",
      "drop packets 20%",
    );
    if (reason) {
      addEvent(
        "warn",
        `packet loss ${packetDrop ? "ENABLED (20%)" : "DISABLED"} — ${reason}`,
      );
    }
  }

  function runAutoDemoSchedule() {
    if (!autoDemo.enabled || missionComplete) return;

    if (!autoDemo.packetLoss && elapsed >= DEMO_TIMELINE.packetLossAt) {
      autoDemo.packetLoss = true;
      setPacketDrop(true, "auto demo packet-loss stage");
      setFooter("auto demo: packet-loss stage engaged");
    }

    if (!autoDemo.contention && elapsed >= DEMO_TIMELINE.contentionAt) {
      autoDemo.contention = true;
      stageDemoContention();
      setFooter("auto demo: contention stage armed");
    }

    if (!autoDemo.dropout && elapsed >= DEMO_TIMELINE.dropoutAt) {
      autoDemo.dropout = true;
      const drone = getAliveDrone("drone_2");
      if (drone) {
        killDrone(drone);
      }
      setFooter("auto demo: dropout stage complete");
    }

    if (!autoDemo.survivor && elapsed >= DEMO_TIMELINE.survivorAt) {
      autoDemo.survivor = true;
      stageDemoSurvivor();
      setFooter("auto demo: survivor confirmation stage armed");
    }
  }

  function killDrone(drone) {
    if (drone.stale) return;
    const index = drones.indexOf(drone);
    releaseClaim(index);
    drone.stale = true;
    drone.tx = null;
    drone.ty = null;
    drone.status = "offline";
    dropouts += 1;
    addEvent(
      "err",
      `${drone.id} heartbeat timeout — zone released back into the demo pool`,
    );
    setFooter(
      `${drone.id} dropped — claim released and peers retargeting the highest-entropy zone`,
    );
  }

  function killRandom() {
    const alive = drones.filter((drone) => !drone.stale);
    if (!alive.length) return;
    killDrone(alive[Math.floor(Math.random() * alive.length)]);
  }

  function reviveAll() {
    drones.forEach((drone, index) => {
      if (!drone.stale) return;
      drone.stale = false;
      respawnDrone(drone, index, true);
      addEvent("ok", `${drone.id} reconnected — vertex rediscovery complete`);
    });
    setFooter("all drones revived — mesh state converged");
  }

  function dropPackets() {
    setPacketDrop(!packetDrop, "mock message-delay mode");
    setFooter(
      packetDrop
        ? "packet loss active — mock consensus may take longer"
        : "packet loss cleared",
    );
  }

  function toggleAutoDemo(forceState) {
    const nextState =
      typeof forceState === "boolean" ? forceState : !autoDemo.enabled;
    autoDemo.enabled = nextState;
    autoDemo.packetLoss = false;
    autoDemo.contention = false;
    autoDemo.dropout = false;
    autoDemo.survivor = false;
    setButtonState(
      demoButton,
      autoDemo.enabled,
      "auto demo on",
      "auto demo off",
    );
    addEvent(
      "info",
      autoDemo.enabled
        ? "auto demo enabled — scripted packet loss, contention, dropout, and survivor stages armed"
        : "auto demo disabled — manual controls restored",
    );
    setFooter(
      autoDemo.enabled
        ? "auto demo ready — advancing toward scripted hackathon milestones"
        : "mesh stable — entropy auctions active",
    );
  }

  function tick() {
    if (missionComplete || sourceMode === "replay" || sourceMode === "live") return;
    for (let step = 0; step < speed; step += 1) {
      elapsed += 1;
      runAutoDemoSchedule();
      decayGrid();
      reassignIdleDrones();
      stepDrones();
    }
    drawGrid();
    renderDrones();
    updateStats();
  }

  canvas.addEventListener("mousemove", (event) => {
    const rect = canvas.getBoundingClientRect();
    const gridX = Math.floor((event.clientX - rect.left) / CELL_SIZE);
    const gridY = Math.floor((event.clientY - rect.top) / CELL_SIZE);
    if (gridX < 0 || gridX >= GRID_SIZE || gridY < 0 || gridY >= GRID_SIZE) {
      tooltip.style.display = "none";
      return;
    }
    const cell = getCell(gridX, gridY);
    const owner = cell.owner >= 0 ? drones[cell.owner].id : "unowned";
    tooltip.style.display = "block";
    tooltip.style.left = `${gridX * CELL_SIZE + CELL_SIZE + 2}px`;
    tooltip.style.top = `${gridY * CELL_SIZE}px`;
    tooltip.textContent = `[${gridX},${gridY}] H=${entropy(cell.certainty).toFixed(3)} c=${cell.certainty.toFixed(2)} ${owner}`;
  });
  canvas.addEventListener("mouseleave", () => {
    tooltip.style.display = "none";
  });
  canvas.addEventListener("click", (event) => {
    const rect = canvas.getBoundingClientRect();
    const gridX = Math.floor((event.clientX - rect.left) / CELL_SIZE);
    const gridY = Math.floor((event.clientY - rect.top) / CELL_SIZE);
    const drone = drones.find(
      (entry) => entry.x === gridX && entry.y === gridY && !entry.stale,
    );
    if (drone) killDrone(drone);
  });

  function setSpeed(value) {
    speed = Number(value);
    document.getElementById("speed-lbl").textContent = `${value}×`;
  }

  if (replayInput) {
    replayInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        applyReplayPayload(JSON.parse(text));
      } catch (error) {
        setFooter(`replay load failed — ${error.message}`);
        addEvent("err", `replay load failed — ${error.message}`);
      } finally {
        event.target.value = "";
      }
    });
  }

  window.killDrone = killDrone;
  window.killRandom = killRandom;
  window.reviveAll = reviveAll;
  window.dropPackets = dropPackets;
  window.toggleAutoDemo = toggleAutoDemo;
  window.setSpeed = setSpeed;
  window.applyReplayPayload = applyReplayPayload;
  window.applyLivePayload = applyLivePayload;
  window.connectLive = connectLive;
  window.disconnectLive = disconnectLive;
  window.clearReplay = clearReplay;
  window.drones = drones;

  addEvent("info", "vertex p2p discovery complete — 5 peers online");
  addEvent(
    "info",
    "shared certainty map initialised — 10×10 grid, all certainty=0.50 (H=1.00)",
  );
  reassignIdleDrones();
  drawGrid();
  renderDrones();
  updateStats();
  setSourceMode("synthetic");
  setButtonState(packetButton, false, "drop packets on", "drop packets 20%");
  setButtonState(demoButton, false, "auto demo on", "auto demo off");
  setSourceMode("synthetic");
  setFooter("mesh stable — entropy auctions active");
  setInterval(tick, TICK_MS);
</script>
