name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bun-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: git diff --exit-code bun.lock
      - run: bun run build
