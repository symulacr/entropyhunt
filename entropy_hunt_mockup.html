<style>
  :root {
    --font-mono:
      ui-monospace, SFMono-Regular, SFMono, Menlo, Monaco, Consolas,
      "Liberation Mono", "Courier New", monospace;
    --font-sans:
      Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
      "Segoe UI", sans-serif;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f3f4f6;
    --color-background-success: #dcfce7;
    --color-background-info: #dbeafe;
    --color-background-warning: #fef3c7;
    --color-background-danger: #fee2e2;
    --color-border-secondary: #9ca3af;
    --color-border-tertiary: #d1d5db;
    --color-border-warning: #f59e0b;
    --color-border-danger: #ef4444;
    --color-text-primary: #111827;
    --color-text-secondary: #374151;
    --color-text-tertiary: #6b7280;
    --color-text-success: #166534;
    --color-text-info: #1d4ed8;
    --color-text-warning: #92400e;
    --color-text-danger: #991b1b;
  }
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  .shell {
    display: flex;
    flex-direction: column;
    min-height: 560px;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .tab {
    font-size: 11px;
    padding: 8px 16px;
    color: var(--color-text-tertiary);
    border-right: 0.5px solid var(--color-border-tertiary);
    font-family: var(--font-mono);
  }
  .tab.active {
    color: var(--color-text-primary);
    background: var(--color-background-secondary);
  }
  .stats {
    display: flex;
    gap: 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .stat {
    flex: 1;
    padding: 8px 12px;
    border-right: 0.5px solid var(--color-border-tertiary);
  }
  .stat:last-child {
    border-right: none;
  }
  .stat-lbl {
    font-size: 9px;
    color: var(--color-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: var(--font-sans);
  }
  .stat-val {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
    font-family: var(--font-mono);
  }
  .body {
    display: flex;
    flex: 1;
  }
  .grid-panel {
    flex: 0 0 auto;
    padding: 14px;
    border-right: 0.5px solid var(--color-border-tertiary);
  }
  .side {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
  }
  .side-block {
    border-bottom: 0.5px solid var(--color-border-tertiary);
    overflow: hidden;
  }
  .side-head {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-tertiary);
    padding: 6px 12px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    font-family: var(--font-sans);
  }
  canvas#grid {
    display: block;
    image-rendering: pixelated;
  }
  .drone-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--color-text-secondary);
  }
  .drone-row:last-child {
    border-bottom: none;
  }
  .d-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .d-id {
    min-width: 52px;
    color: var(--color-text-primary);
  }
  .d-zone {
    min-width: 44px;
    color: var(--color-text-tertiary);
  }
  .d-status {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    font-family: var(--font-sans);
  }
  .ds-searching {
    background: var(--color-background-success);
    color: var(--color-text-success);
  }
  .ds-transit {
    background: var(--color-background-info);
    color: var(--color-text-info);
  }
  .ds-bid {
    background: var(--color-background-warning);
    color: var(--color-text-warning);
  }
  .ds-stale {
    background: var(--color-background-danger);
    color: var(--color-text-danger);
  }
  .ds-idle {
    background: var(--color-background-secondary);
    color: var(--color-text-tertiary);
  }
  .log-line {
    padding: 4px 10px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--color-text-secondary);
    line-height: 1.5;
  }
  .log-line .ev-type {
    font-weight: 500;
  }
  .ev-bft {
    color: var(--color-text-warning);
  }
  .ev-found {
    color: var(--color-text-success);
  }
  .ev-stale {
    color: var(--color-text-danger);
  }
  .ev-claim {
    color: var(--color-text-info);
  }
  .ticker2 {
    font-size: 9px;
    color: var(--color-text-tertiary);
    padding: 5px 12px;
    border-top: 0.5px solid var(--color-border-tertiary);
    font-family: var(--font-mono);
  }
</style>

<div class="shell">
  <div class="topbar">
    <div class="tab active">hunt console</div>
    <div class="tab">entropy map</div>
    <div class="tab">bft log</div>
    <div style="flex: 1"></div>
    <div
      class="tab"
      style="
        border-left: 0.5px solid var(--color-border-tertiary);
        border-right: none;
      "
    >
      mesh: 5 peers
    </div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-lbl">coverage</div>
      <div class="stat-val" id="sv-cov">0%</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">avg entropy</div>
      <div class="stat-val" id="sv-ent">1.00</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">bft rounds</div>
      <div class="stat-val" id="sv-bft">0</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">auctions</div>
      <div class="stat-val" id="sv-auc">0</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">elapsed</div>
      <div class="stat-val" id="sv-time">0s</div>
    </div>
  </div>
  <div class="body">
    <div class="grid-panel">
      <canvas id="grid" width="220" height="220"></canvas>
    </div>
    <div class="side">
      <div class="side-block" style="flex: 0 0 auto">
        <div class="side-head">drone roster</div>
        <div id="drone-list"></div>
      </div>
      <div class="side-block" style="flex: 1; overflow-y: auto">
        <div class="side-head">event log</div>
        <div id="event-log"></div>
      </div>
    </div>
  </div>
  <div class="ticker2" id="tick2">initialising vertex p2p discovery...</div>
</div>

<script>
  const G = 10;
  const CELL = 22;
  const TOTAL_CELLS = G * G;
  const canvas = document.getElementById("grid");
  const ctx = canvas.getContext("2d");
  const css = getComputedStyle(document.documentElement);
  const resolveToken = (name, fallback) =>
    css.getPropertyValue(name).trim() || fallback;
  const gridLineColor = resolveToken("--color-border-secondary", "#9ca3af");

  const droneColors = ["#378ADD", "#1D9E75", "#BA7517", "#D85A30", "#D4537E"];
  const droneNames = ["d_1", "d_2", "d_3", "d_4", "d_5"];
  const randomCoord = () => Math.floor(Math.random() * G);

  let grid = Array.from({ length: G }, () =>
    Array.from({ length: G }, () => 0.5),
  );
  let claimed = Array.from({ length: G }, () => Array(G).fill(-1));

  let drones = droneColors.map((c, i) => ({
    id: droneNames[i],
    color: c,
    x: randomCoord(),
    y: randomCoord(),
    tx: randomCoord(),
    ty: randomCoord(),
    status: "transit",
    progress: 0,
  }));

  let bftRound = 0,
    auctions = 0,
    elapsed = 0,
    events = [];

  function H(c) {
    if (c <= 0 || c >= 1) return 0;
    return -(c * Math.log2(c) + (1 - c) * Math.log2(1 - c));
  }
  function distanceSq(drone, cell) {
    const dx = drone.x - cell[0],
      dy = drone.y - cell[1];
    return dx * dx + dy * dy;
  }
  function pickAuctionWinner(cell, contenders) {
    return contenders.slice().sort((a, b) => {
      const delta = distanceSq(a, cell) - distanceSq(b, cell);
      if (delta !== 0) return delta;
      return a.id.localeCompare(b.id);
    })[0];
  }

  function maxEntropyCell(excludedCells) {
    let best = null,
      bestH = -1;
    for (let y = 0; y < G; y++)
      for (let x = 0; x < G; x++) {
        if (excludedCells.some((c) => c[0] === x && c[1] === y)) continue;
        if (claimed[y][x] >= 0) continue;
        const h = H(grid[y][x]);
        if (h > bestH) {
          bestH = h;
          best = [x, y];
        }
      }
    return best;
  }

  function addEvent(type, msg) {
    events.unshift({ type, msg, t: elapsed });
    if (events.length > 12) events.pop();
  }

  function decay() {
    for (let y = 0; y < G; y++)
      for (let x = 0; x < G; x++) {
        if (claimed[y][x] < 0) grid[y][x] += 0.002 * (0.5 - grid[y][x]);
      }
  }

  function assignTargets() {
    const usedCells = [];
    drones.forEach((d, i) => {
      if (d.status === "transit" && d.x === d.tx && d.y === d.ty) {
        d.status = "searching";
      }
      if (d.status === "searching" || d.status === "idle") {
        claimed[d.ty][d.tx] = -1;
        const cell = maxEntropyCell(usedCells);
        if (!cell) {
          d.status = "idle";
          return;
        }
        const conflict = drones.filter(
          (o, j) => j !== i && o.tx === cell[0] && o.ty === cell[1],
        );
        if (conflict.length > 0) {
          auctions++;
          const winner = pickAuctionWinner(cell, [d, ...conflict]);
          addEvent(
            "bft",
            `BFT auction: ${d.id} vs ${conflict[0].id} → zone [${cell}] → winner ${winner.id}`,
          );
          bftRound++;
          if (winner !== d) {
            const alt = maxEntropyCell([...usedCells, cell]);
            if (alt) {
              d.tx = alt[0];
              d.ty = alt[1];
              usedCells.push(alt);
            }
            return;
          }
        }
        d.tx = cell[0];
        d.ty = cell[1];
        usedCells.push(cell);
        claimed[cell[1]][cell[0]] = i;
        d.status = "transit";
      }
    });
  }

  function moveDrones() {
    drones.forEach((d) => {
      if (d.x !== d.tx) d.x += d.x < d.tx ? 1 : -1;
      else if (d.y !== d.ty) d.y += d.y < d.ty ? 1 : -1;
      if (d.x === d.tx && d.y === d.ty) {
        d.status = "searching";
        grid[d.y][d.x] = Math.min(1, grid[d.y][d.x] + 0.12);
      }
    });
  }

  function drawGrid() {
    for (let y = 0; y < G; y++)
      for (let x = 0; x < G; x++) {
        const c = grid[y][x];
        const h = H(c);
        const bright = Math.floor(255 - h * 180);
        const droneHere = drones.findIndex((d) => d.x === x && d.y === y);
        if (droneHere >= 0) {
          ctx.fillStyle = droneColors[droneHere] + "44";
        } else {
          ctx.fillStyle = `rgb(${bright},${bright},${bright})`;
        }
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
        if (claimed[y][x] >= 0) {
          ctx.strokeStyle = droneColors[claimed[y][x]] + "66";
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x * CELL + 0.5, y * CELL + 0.5, CELL - 1, CELL - 1);
        }
      }
    drones.forEach((d) => {
      ctx.beginPath();
      ctx.arc(d.x * CELL + CELL / 2, d.y * CELL + CELL / 2, 4, 0, Math.PI * 2);
      ctx.fillStyle = d.color;
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1;
      ctx.stroke();
    });
    ctx.strokeStyle = gridLineColor;
    ctx.lineWidth = 0.3;
    for (let i = 0; i <= G; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, G * CELL);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(G * CELL, i * CELL);
      ctx.stroke();
    }
  }

  function coverage() {
    let done = 0;
    for (let y = 0; y < G; y++)
      for (let x = 0; x < G; x++) if (grid[y][x] > 0.85) done++;
    return Math.round((done / TOTAL_CELLS) * 100);
  }

  function avgEntropy() {
    let s = 0;
    for (let y = 0; y < G; y++) for (let x = 0; x < G; x++) s += H(grid[y][x]);
    return (s / TOTAL_CELLS).toFixed(2);
  }

  function renderSide() {
    const dl = document.getElementById("drone-list");
    dl.innerHTML = drones
      .map(
        (d) => `
    <div class="drone-row">
      <div class="d-dot" style="background:${d.color}"></div>
      <span class="d-id">${d.id}</span>
      <span class="d-zone">[${d.x},${d.y}]</span>
      <span class="d-zone">→[${d.tx},${d.ty}]</span>
      <span class="d-status ${d.status === "searching" ? "ds-searching" : d.status === "transit" ? "ds-transit" : d.status === "idle" ? "ds-idle" : "ds-bid"}">${d.status}</span>
    </div>`,
      )
      .join("");

    const el = document.getElementById("event-log");
    el.innerHTML = events
      .map(
        (e) => `
    <div class="log-line">
      <span class="ev-type ${e.type === "bft" ? "ev-bft" : e.type === "found" ? "ev-found" : e.type === "stale" ? "ev-stale" : "ev-claim"}">${e.type.toUpperCase()}</span>
      <span style="color:var(--color-text-tertiary)"> t=${e.t}s</span> ${e.msg}
    </div>`,
      )
      .join("");

    const cov = coverage();
    document.getElementById("sv-cov").textContent = cov + "%";
    document.getElementById("sv-ent").textContent = avgEntropy();
    document.getElementById("sv-bft").textContent = bftRound;
    document.getElementById("sv-auc").textContent = auctions;
    document.getElementById("sv-time").textContent = elapsed + "s";
    document.getElementById("tick2").textContent =
      "[t=" +
      elapsed +
      "s · bft:" +
      bftRound +
      "] coverage " +
      cov +
      "% · avg H=" +
      avgEntropy();

    if (cov >= 90 && !window._foundLogged) {
      window._foundLogged = true;
      addEvent(
        "found",
        "survivor detected at max-certainty zone — swarm/survivor_found published",
      );
    }
  }

  addEvent("claim", "vertex p2p discovery complete — 5 peers online");
  addEvent(
    "claim",
    "initial zone scan complete — drones selecting max-entropy cells",
  );

  setInterval(() => {
    elapsed++;
    decay();
    moveDrones();
    assignTargets();
    if (elapsed % 15 === 0 && Math.random() < 0.4) {
      const d = drones[Math.floor(Math.random() * 5)];
      addEvent(
        "stale",
        `${d.id} heartbeat timeout — zone [${d.tx},${d.ty}] released to mesh`,
      );
      claimed[d.ty][d.tx] = -1;
      d.x = randomCoord();
      d.y = randomCoord();
      addEvent(
        "claim",
        `${d.id} reconnected — rejoining swarm via vertex discovery`,
      );
    }
    drawGrid();
    renderSide();
  }, 700);
</script>
